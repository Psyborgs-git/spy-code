<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spy-Code Unified Graph Visualization</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background: rgba(15, 15, 26, 0.95);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #2a2a4a;
            z-index: 10;
        }

        h1 {
            margin: 0;
            font-size: 18px;
            color: #7eb8ff;
            font-weight: 600;
            margin-right: 20px;
        }

        .search-container {
            display: flex;
            flex: 1;
            max-width: 600px;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 10px;
            background: #1a1a2e;
            border: 1px solid #3a3a5a;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #7eb8ff;
            box-shadow: 0 0 0 2px rgba(126, 184, 255, 0.2);
        }

        button {
            padding: 10px 16px;
            background: linear-gradient(135deg, #7eb8ff 0%, #5a9eff 100%);
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(126, 184, 255, 0.3);
        }

        #cy {
            flex: 1;
            width: 100%;
            position: relative;
        }

        .legend {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(15, 15, 26, 0.9);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #2a2a4a;
            z-index: 10;
            font-size: 12px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }
        .legend-item:last-child {
            margin-bottom: 0;
        }
        .legend-color {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            margin-right: 10px;
        }

        .controls {
            position: absolute;
            top: 80px;
            right: 20px;
            background: rgba(15, 15, 26, 0.9);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #2a2a4a;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .controls label {
            font-size: 12px;
            color: #888;
        }

        .controls select {
            padding: 8px;
            background: #1a1a2e;
            border: 1px solid #3a3a5a;
            border-radius: 4px;
            color: #e0e0e0;
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #7eb8ff;
            font-size: 18px;
            font-weight: bold;
            display: none;
            z-index: 20;
        }
    </style>
</head>
<body>
    <header>
        <h1>Spy-Code</h1>
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Search nodes or ask a semantic question...">
            <button id="search-btn">Basic Search</button>
            <button id="semantic-search-btn">Semantic Search</button>
        </div>
    </header>

    <div class="controls">
        <label>Cluster By:</label>
        <select id="cluster-select">
            <option value="none">None (Cose Layout)</option>
            <option value="folder">Folder Structure (Concentric)</option>
            <option value="kind">Node Kind (Grid)</option>
        </select>
        <button id="reload-graph-btn">Reload Full Graph</button>
    </div>

    <div id="cy"></div>
    <div id="loading" class="loading">Loading...</div>

    <div class="legend">
        <div class="legend-item">
            <div class="legend-color" style="background: #7eb8ff;"></div>
            <span>Function</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #ff6b6b;"></div>
            <span>Class</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #6bff6b;"></div>
            <span>Constant</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #ffd93d;"></div>
            <span>Dependency / Other</span>
        </div>
    </div>

    <script>
        let cy;
        const cyContainer = document.getElementById('cy');
        const loadingEl = document.getElementById('loading');

        function initCytoscape() {
            cy = cytoscape({
                container: cyContainer,
                style: [
                    {
                        selector: 'node',
                        style: {
                            'label': 'data(name)',
                            'background-color': '#7eb8ff',
                            'color': '#fff',
                            'text-valign': 'bottom',
                            'text-margin-y': 5,
                            'font-size': '10px',
                            'width': 20,
                            'height': 20,
                            'border-width': 2,
                            'border-color': '#2a2a4a'
                        }
                    },
                    {
                        selector: 'node[kind="CLASS"]',
                        style: { 'background-color': '#ff6b6b' }
                    },
                    {
                        selector: 'node[kind="CONSTANT"]',
                        style: { 'background-color': '#6bff6b' }
                    },
                    {
                        selector: 'edge',
                        style: {
                            'width': 1.5,
                            'line-color': '#4a4a6a',
                            'target-arrow-color': '#4a4a6a',
                            'target-arrow-shape': 'triangle',
                            'curve-style': 'bezier',
                            'opacity': 0.6
                        }
                    },
                    {
                        selector: ':selected',
                        style: {
                            'border-color': '#fff',
                            'border-width': 3,
                            'width': 25,
                            'height': 25
                        }
                    }
                ],
                layout: { name: 'cose' }
            });

            cy.on('tap', 'node', function(evt){
                const node = evt.target;
                console.log('Tapped node:', node.data());
                // In a real integration, this might open details or file
            });
        }

        async function fetchGraphData(query) {
            loadingEl.style.display = 'block';
            try {
                const response = await fetch('/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query })
                });
                const result = await response.json();
                if (result.errors) throw new Error(result.errors[0].message);
                return result.data;
            } catch (error) {
                console.error("Error fetching data:", error);
                alert("Error fetching data: " + error.message);
                return null;
            } finally {
                loadingEl.style.display = 'none';
            }
        }

        async function loadFullGraph() {
            const query = \`
                query {
                    graphData {
                        nodes { id kind name filePath startLine }
                        edges { fromId toId kind }
                    }
                }
            \`;
            const data = await fetchGraphData(query);
            if (data && data.graphData) {
                renderGraph(data.graphData.nodes, data.graphData.edges);
            }
        }

        function renderGraph(nodes, edges) {
            const elements = [];

            nodes.forEach(n => {
                // Determine folder for clustering
                const filePath = n.filePath || '';
                const parts = filePath.split('/');
                const folder = parts.length > 1 ? parts.slice(0, -1).join('/') : 'root';

                elements.push({
                    data: {
                        id: n.id,
                        name: n.name,
                        kind: n.kind,
                        filePath: n.filePath,
                        folder: folder
                    }
                });
            });

            edges.forEach(e => {
                elements.push({
                    data: {
                        source: e.fromId,
                        target: e.toId,
                        kind: e.kind
                    }
                });
            });

            cy.elements().remove();
            cy.add(elements);
            applyLayout();
        }

        function applyLayout() {
            const layoutType = document.getElementById('cluster-select').value;
            let layoutConfig = { name: 'cose', padding: 30, nodeDimensionsIncludeLabels: true };

            if (layoutType === 'folder') {
                layoutConfig = {
                    name: 'concentric',
                    concentric: function(node) {
                        // cluster by folder logic
                        // Using char code sum as a simple numerical value for concentric circles
                        let sum = 0;
                        const folder = node.data('folder') || '';
                        for(let i=0; i<folder.length; i++) {
                            sum += folder.charCodeAt(i);
                        }
                        return sum;
                    },
                    levelWidth: function(nodes) {
                        return 100;
                    },
                    padding: 30
                };
            } else if (layoutType === 'kind') {
                layoutConfig = {
                    name: 'grid',
                    sort: function(a, b) {
                        return a.data('kind').localeCompare(b.data('kind'));
                    },
                    padding: 30
                };
            }

            cy.layout(layoutConfig).run();
        }

        document.getElementById('reload-graph-btn').addEventListener('click', loadFullGraph);
        document.getElementById('cluster-select').addEventListener('change', applyLayout);

        // Basic Search
        document.getElementById('search-btn').addEventListener('click', () => {
            const queryText = document.getElementById('search-input').value.toLowerCase();
            if(!queryText) {
                loadFullGraph();
                return;
            }

            cy.nodes().forEach(node => {
                const name = (node.data('name') || '').toLowerCase();
                const filePath = (node.data('filePath') || '').toLowerCase();
                if(name.includes(queryText) || filePath.includes(queryText)) {
                } else {
                    node.style('display', 'none');
                }
            });
            // Also hide edges where one of the nodes is hidden
            cy.edges().forEach(edge => {
                if(edge.source().style('display') === 'none' || edge.target().style('display') === 'none') {
                    edge.style('display', 'none');
                } else {
                    edge.style('display', 'element');
                }
            });
            cy.layout({name: 'cose'}).run();
        });

        // Semantic Search Placeholder
        // A true semantic search would involve hitting an endpoint that uses embeddings to return node IDs, then filtering the graph.
        document.getElementById('semantic-search-btn').addEventListener('click', async () => {
             const queryText = document.getElementById('search-input').value;
             if(!queryText) return;

             alert("Semantic search requires backend embedding integration which would filter node IDs here.");
             // Pseudo code:
             // const nodeIds = await fetchSemanticResults(queryText);
             // cy.nodes().forEach(n => { n.style('display', nodeIds.includes(n.id()) ? 'element' : 'none') });
        });

        initCytoscape();
        loadFullGraph();
    </script>
</body>
</html>
