name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            use_cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross
      - name: Build binary (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }} --bin spy-code
      - name: Build binary (cargo)
        if: '!matrix.use_cross'
        run: cargo build --release --target ${{ matrix.target }} --bin spy-code
      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          BIN=target/${{ matrix.target }}/release/spy-code
          ARCHIVE=spy-code-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
          tar czf "$ARCHIVE" -C "$(dirname $BIN)" "$(basename $BIN)"
          sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV
      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $BIN = "target/${{ matrix.target }}/release/spy-code.exe"
          $ARCHIVE = "spy-code-${{ github.ref_name }}-${{ matrix.target }}.zip"
          Compress-Archive -Path $BIN -DestinationPath $ARCHIVE
          (Get-FileHash $ARCHIVE -Algorithm SHA256).Hash | Out-File "$ARCHIVE.sha256"
          echo "ARCHIVE=$ARCHIVE" >> $env:GITHUB_ENV
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spy-code-${{ matrix.target }}
          path: |
            spy-code-*.tar.gz
            spy-code-*.zip
            *.sha256

  publish:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/*.sha256
          generate_release_notes: true
