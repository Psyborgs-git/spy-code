name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Build native binaries for all target platforms
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build – ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: linux-x64
            bin: spy-code
          - os: macos-latest
            target: x86_64-apple-darwin
            name: darwin-x64
            bin: spy-code
          - os: macos-latest
            target: aarch64-apple-darwin
            name: darwin-arm64
            bin: spy-code
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: win32-x64
            bin: spy-code.exe

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.platform.target }}

      - name: Bump version in all package files
        run: python3 scripts/bump_version.py ${{ github.ref_name }}

      - name: Build binary
        run: cargo build --release --target ${{ matrix.platform.target }} --package spy-cli

      - name: Package binary artifact
        shell: bash
        run: |
          mkdir -p dist
          if [ "${{ matrix.platform.os }}" = "windows-latest" ]; then
            cp "target/${{ matrix.platform.target }}/release/spy-code.exe" \
               "dist/spy-code-${{ matrix.platform.name }}.exe"
          else
            cp "target/${{ matrix.platform.target }}/release/spy-code" \
               "dist/spy-code-${{ matrix.platform.name }}"
            chmod +x "dist/spy-code-${{ matrix.platform.name }}"
          fi

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: spy-code-${{ matrix.platform.name }}
          path: dist/*
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Create GitHub Release and upload all binaries
  # ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Publish the npm wrapper package to npmjs.org
  # ─────────────────────────────────────────────────────────────────────────────
  publish-npm:
    name: Publish to npm
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Bump version in npm/package.json
        run: python3 scripts/bump_version.py ${{ github.ref_name }}

      - name: Publish npm package
        # The `files` field in package.json limits what is published:
        # only bin/index.js and install.js are included.
        # The native binaries are NOT shipped – they are downloaded on install.
        run: npm publish --access public
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 4: Publish the Python wrapper package to PyPI
  # Uses OIDC Trusted Publishing (no secret needed if configured on PyPI).
  # Falls back to PYPI_API_TOKEN secret if Trusted Publishing is not set up.
  # ─────────────────────────────────────────────────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    needs: release
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/spy-code
    permissions:
      id-token: write  # Required for OIDC Trusted Publishing
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: python -m pip install --upgrade build

      - name: Bump version in Python package files
        run: python3 scripts/bump_version.py ${{ github.ref_name }}

      - name: Build source distribution and wheel
        run: python -m build
        working-directory: python-package

      - name: List distribution files
        run: ls -lh python-package/dist/

      - name: Publish to PyPI (Trusted Publishing / OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python-package/dist/
          # If OIDC Trusted Publishing is NOT yet configured on PyPI,
          # uncomment the two lines below and add PYPI_API_TOKEN to your
          # repository secrets instead.
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
