<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
<title id="title">spy-code architecture</title><desc id="desc">Flow from source files through tree-sitter parsing, language resolvers, SQLite storage, GraphQL, CLI, MCP, embeddings and graph UI.</desc>
<defs><linearGradient id="a" x1="0" x2="1"><stop stop-color="#8B5CF6"/><stop offset="1" stop-color="#06B6D4"/></linearGradient><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#38BDF8"/></marker></defs>
<rect width="1280" height="720" rx="32" fill="#070B18"/>
<text x="64" y="86" font-family="Inter, Segoe UI, Arial" font-size="48" font-weight="800" fill="white">How spy-code turns a repository into an agent-readable graph</text>
<text x="64" y="124" font-family="Inter, Segoe UI, Arial" font-size="21" fill="#94A3B8">Static parser + resolver pipeline. Persistent SQLite graph. Query surfaces for humans, tools, and AI agents.</text>
<g font-family="Inter, Segoe UI, Arial" font-size="18" fill="white" stroke="#334155" stroke-width="2">
<rect x="75" y="220" width="170" height="88" rx="18" fill="#0F172A"/><text x="108" y="255" font-weight="700">Source files</text><text x="102" y="284" fill="#94A3B8">Rust / Py / TS / Go</text>
<rect x="320" y="220" width="190" height="88" rx="18" fill="#0F172A"/><text x="361" y="255" font-weight="700">tree-sitter</text><text x="354" y="284" fill="#94A3B8">Parse syntax trees</text>
<rect x="585" y="220" width="210" height="88" rx="18" fill="#0F172A"/><text x="624" y="255" font-weight="700">Resolvers</text><text x="618" y="284" fill="#94A3B8">Nodes + edges</text>
<rect x="870" y="220" width="190" height="88" rx="18" fill="#0F172A"/><text x="927" y="255" font-weight="700">SQLite</text><text x="904" y="284" fill="#94A3B8">.spy-code/graph.db</text>
<line x1="245" y1="264" x2="320" y2="264" stroke="#38BDF8" stroke-width="4" marker-end="url(#arrow)"/><line x1="510" y1="264" x2="585" y2="264" stroke="#38BDF8" stroke-width="4" marker-end="url(#arrow)"/><line x1="795" y1="264" x2="870" y2="264" stroke="#38BDF8" stroke-width="4" marker-end="url(#arrow)"/>
<rect x="165" y="452" width="180" height="86" rx="18" fill="#111827"/><text x="232" y="486" font-weight="700">CLI</text><text x="198" y="514" fill="#94A3B8">search, callers</text>
<rect x="420" y="452" width="180" height="86" rx="18" fill="#111827"/><text x="470" y="486" font-weight="700">GraphQL</text><text x="453" y="514" fill="#94A3B8">multi-hop queries</text>
<rect x="675" y="452" width="180" height="86" rx="18" fill="#111827"/><text x="736" y="486" font-weight="700">MCP</text><text x="704" y="514" fill="#94A3B8">agent tools</text>
<rect x="930" y="452" width="180" height="86" rx="18" fill="#111827"/><text x="980" y="486" font-weight="700">Graph UI</text><text x="958" y="514" fill="#94A3B8">visual explore</text>
<line x1="965" y1="308" x2="255" y2="452" stroke="#38BDF8" stroke-width="3" opacity=".65" marker-end="url(#arrow)"/><line x1="965" y1="308" x2="510" y2="452" stroke="#38BDF8" stroke-width="3" opacity=".65" marker-end="url(#arrow)"/><line x1="965" y1="308" x2="765" y2="452" stroke="#38BDF8" stroke-width="3" opacity=".65" marker-end="url(#arrow)"/><line x1="965" y1="308" x2="1020" y2="452" stroke="#38BDF8" stroke-width="3" opacity=".65" marker-end="url(#arrow)"/>
</g>
<text x="64" y="650" font-family="Inter, Segoe UI, Arial" font-size="22" fill="#CBD5E1">Use it when AI needs exact codebase structure, not another blob of copied source.</text>
</svg>
